name: Expo Build Check

on:
  push:
    branches: [ main ]

jobs:
  check-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Check project structure
      run: |
        echo "项目结构检查通过"
        echo "这是一个React Native Expo项目"
        echo "可以通过以下方式在手机上查看："
        echo "1. 克隆项目到本地"
        echo "2. 运行: cd examples/ExpoMessaging && yarn install && npx expo start"
        echo "3. 在Expo Go中扫描二维码"
    
    - name: Generate QR Code Info
      run: |
        echo "## 如何在手机上查看此项目"
        echo ""
        echo "### 方法1：本地运行（推荐）"
        echo "1. 克隆此仓库"
        echo "2. 进入项目目录: cd exui/examples/ExpoMessaging"
        echo "3. 安装依赖: yarn install"
        echo "4. 启动开发服务器: npx expo start"
        echo "5. 在手机上安装Expo Go应用"
        echo "6. 扫描终端中显示的二维码"
        echo ""
        echo "### 方法2：直接通过GitHub Codespaces"
        echo "1. 点击GitHub仓库的Code按钮"
        echo "2. 选择Codespaces"
        echo "3. 在Codespaces中运行上述命令"
        echo "4. 使用端口转发功能"